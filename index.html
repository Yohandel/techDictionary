<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario Tecnólogico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="bg-primary text-white text-center py-4 mb-4">
        <h1>Diccionario Tecnológico</h1>
    </div>
    <div class="container">
        <input type="text" id="searchInput" class="form-control mb-3" placeholder="Buscar término...">
        
        <table class="table" id="termTable">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Término</th>
                </tr>
            </thead>
            <tbody>
             
            </tbody>
        </table>
    </div>
    <div class="container mt-4">
    <div class="row mb-3">
        <div class="col-md-4">
            <select id="itemsPerPage" class="form-select">
                <option value="5">5 por página</option>
                <option value="10">10 por página</option>
                <option value="20">20 por página</option>
                <option value="1">1 por página</option>
                <option value="all">Mostrar todos</option>
            </select>
        </div>
    </div>


    <nav>
        <ul class="pagination justify-content-center" id="paginationControls"></ul>
    </nav>
</div>
</body>

</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
<script src="./index.js"></script>
